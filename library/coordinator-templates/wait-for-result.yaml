# ─────────────────────────────────────────────────────────────────────────────
# Coordinator Template: wait-for-result
#
# Structure: Primary fires ONE handler and suspends.
#            Resumes at resume_at_step when handler returns.
#            Handler result injected into primary context.
#
# Use when: Primary cannot finalise without specialist input from one
#           other workflow. For multiple parallel handlers, use
#           parallel-handlers.yaml instead.
#
# Failure modes:
#   - Handler timeout: coordinator escalates to hold queue.
#     Primary remains suspended until manually resolved or SLA is extended.
#   - Handler returns error: primary receives error in
#     ${input.delegation.<handler_name>.error}.
#     Design the resume step to handle missing results.
#
# What to fill in:
#   1. governance_tiers: queues and SLAs
#   2. One delegation entry with mode: wait_for_result
#   3. One capability entry for the handler workflow
# ─────────────────────────────────────────────────────────────────────────────

workflow_dir: workflows
domain_dir: domains
case_dir: cases

# ─── Governance Tiers ────────────────────────────────────────────────────────
governance_tiers:
  auto:
    hitl: none
    sample_rate: 0.0

  spot_check:
    hitl: post_completion
    sample_rate: 0.10
    queue: qa_review            # [FILL IN]
    sla: 7200

  gate:
    hitl: before_act
    queue: human_review         # [FILL IN]
    sla: 14400

  hold:
    hitl: before_finalize
    queue: compliance_review    # [FILL IN]
    sla: 172800

overrides: {}

quality_gates:
  min_confidence: 0.5
  primitive_floors:
    classify: 0.6
    investigate: 0.5
    verify: 0.5
  escalation_tier: gate
  escalation_queue: quality_review   # [FILL IN]
  exempt_domains: []

# ─── Delegation ──────────────────────────────────────────────────────────────
delegations:

  - name: specialist_review              # [FILL IN] e.g. underwriter_review
    mode: wait_for_result
    resume_at_step: govern_decision      # [FILL IN] step in primary that resumes
    governance_tier: auto                # or gate if specialist needs its own review
    conditions:
      - domain: primary_domain_name      # [FILL IN]
        selector: last_classify          # [FILL IN] or last_deliberate, last_verify
        field: category                  # [FILL IN]
        operator: eq
        value: high_risk                 # [FILL IN] trigger condition
    target_workflow: specialist_workflow # [FILL IN]
    target_domain: specialist_domain     # [FILL IN]
    sla: 14400                           # [FILL IN] seconds
    inputs:
      case_id: "${source.input.case_id}"
      # [FILL IN] what data does the specialist need?
      risk_tier: "${source.last_classify.category}"
      investigation_finding: "${source.last_investigate.finding}"

# ─── Capabilities ────────────────────────────────────────────────────────────
capabilities:

  - need: specialist_review              # [FILL IN]
    type: workflow
    workflow: specialist_workflow        # [FILL IN]
    domain: specialist_domain            # [FILL IN]

  - need: human_review
    type: human_task
    queue: human_review                  # [FILL IN]
