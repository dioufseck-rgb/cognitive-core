# ─────────────────────────────────────────────────────────────────────────────
# Pattern: P02 (Eligibility Determination) — lightweight embeddable variant
#
# Designed for embedding in web apps and portals where eligibility decisions
# need to be fast, explainable, and consistently applied.
#
# Standard path: retrieve → classify → verify → govern  (most cases)
# Review path:   retrieve → classify → investigate → deliberate → verify → govern
#
# The classify step determines which path:
#   clearly_eligible   → verify → govern  (fast, typically AUTO)
#   borderline         → investigate → deliberate → verify → govern
#   clearly_ineligible → verify → govern  (fast, denial with specific reasons)
# ─────────────────────────────────────────────────────────────────────────────

name: eligibility_check
description: >
  Fast governed eligibility determination for web and app embedding.
  Clear cases resolve in seconds. Borderline cases investigate before
  deciding. Every determination — approval or denial — produces a warrant
  with specific reasons traceable to the eligibility criteria.

steps:
  - name: retrieve_applicant_data
    primitive: retrieve
    params:
      specification: "${domain.retrieve_applicant_data.specification}"
      strategy: deterministic
    transitions:
      - default: classify_eligibility

  - name: classify_eligibility
    primitive: classify
    temperature: 0.0
    params:
      categories: "${domain.classify_eligibility.categories}"
      criteria: |
        ${domain.classify_eligibility.input_context}
        ${domain.classify_eligibility.criteria}
    transitions:
      - when: "${domain.classify_eligibility.review_condition}"
        goto: investigate_borderline
      - default: verify_eligibility

  - name: investigate_borderline
    primitive: investigate
    params:
      question: "${domain.investigate_borderline.question}"
      scope: "${domain.investigate_borderline.scope}"
      available_evidence: "${domain.investigate_borderline.input_context}"
      effort_level: "${domain.investigate_borderline.effort_level}"
    transitions:
      - default: deliberate_eligibility

  - name: deliberate_eligibility
    primitive: deliberate
    params:
      instruction: |
        ${domain.deliberate_eligibility.context}
        ${domain.deliberate_eligibility.instruction}
      focus: "${domain.deliberate_eligibility.focus}"
    transitions:
      - default: verify_eligibility

  - name: verify_eligibility
    primitive: verify
    temperature: 0.0
    params:
      rules: "${domain.verify_eligibility.rules}"
      subject: |
        ${domain.verify_eligibility.subject_context}
    transitions:
      - default: govern_eligibility

  - name: govern_eligibility
    primitive: govern
    params:
      workflow_state: |
        ${domain.govern_eligibility.workflow_state}
      governance_context: "${domain.govern_eligibility.governance_context}"
