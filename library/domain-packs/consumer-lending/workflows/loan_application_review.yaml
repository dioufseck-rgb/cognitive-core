name: loan_application_review
description: >
  Full-chain loan application review. Retrieve applicant data, classify
  risk tier, investigate edge cases, deliberate on the recommendation,
  verify regulatory compliance, then govern disposition.
  High-risk applications delegate to a specialist credit review.

steps:
  - name: gather_application
    primitive: retrieve
    params:
      specification: "${domain.gather_application.specification}"
      strategy: deterministic

  - name: classify_risk
    primitive: classify
    temperature: 0.0
    params:
      categories: "${domain.classify_risk.categories}"
      criteria: |
        ${domain.classify_risk.input_context}
        ${domain.classify_risk.criteria}
    transitions:
      - when: "output.category == 'high_risk'"
        goto: investigate_risk_factors
      - when: "output.category == 'ineligible'"
        goto: verify_compliance
      - default: deliberate_recommendation

  - name: investigate_risk_factors
    primitive: investigate
    params:
      question: "${domain.investigate_risk_factors.question}"
      scope: "${domain.investigate_risk_factors.scope}"
      available_evidence: "${domain.investigate_risk_factors.input_context}"
      effort_level: deep
    transitions:
      - default: deliberate_recommendation

  - name: deliberate_recommendation
    primitive: deliberate
    params:
      instruction: |
        ${domain.deliberate_recommendation.context}
        ${domain.deliberate_recommendation.instruction}
      focus: "${domain.deliberate_recommendation.focus}"

  - name: verify_compliance
    primitive: verify
    temperature: 0.0
    params:
      rules: "${domain.verify_compliance.rules}"
      subject: |
        ${domain.verify_compliance.subject_context}
    transitions:
      - default: govern_decision

  - name: govern_decision
    primitive: govern
    params:
      workflow_state: |
        ${domain.govern_decision.workflow_state}
      governance_context: "${domain.govern_decision.governance_context}"
