name: loan_application_review
description: >
  Full-chain loan application review. Retrieve applicant data, classify
  risk tier, investigate edge cases, deliberate on the recommendation,
  verify regulatory compliance, then govern disposition.
  High-risk applications delegate to a specialist credit review.

steps:
  - name: gather_application
    primitive: retrieve
    params:
      specification: "${domain.gather_application.specification}"
      strategy: deterministic

  - name: classify_risk
    primitive: classify
    temperature: 0.0
    params:
      categories: "${domain.classify_risk.categories}"
      criteria: |
        Applicant: ${input.applicant_name}, ${input.applicant_age}
        Requested amount: ${input.loan_amount}
        Purpose: ${input.loan_purpose}
        Credit score: ${gather_application.data.get_credit.score}
        DTI ratio: ${gather_application.data.get_financials.dti_ratio}
        Employment: ${gather_application.data.get_employment.status}
        ${domain.classify_risk.criteria}
    transitions:
      - when: "output.category == 'high_risk'"
        goto: investigate_risk_factors
      - when: "output.category == 'ineligible'"
        goto: verify_compliance
      - default: deliberate_recommendation

  - name: investigate_risk_factors
    primitive: investigate
    params:
      question: |
        What are the specific risk factors and are there mitigating circumstances?
      scope: "${domain.investigate_risk_factors.scope}"
      available_evidence: |
        Credit profile: ${gather_application.data.get_credit}
        Financials: ${gather_application.data.get_financials}
        Employment: ${gather_application.data.get_employment}
        Banking history: ${gather_application.data.get_banking}
      effort_level: deep
    transitions:
      - default: deliberate_recommendation

  - name: deliberate_recommendation
    primitive: deliberate
    params:
      instruction: |
        Based on the application data and risk classification, determine
        the appropriate lending recommendation.

        Risk classification: ${classify_risk.category}
        ${input.investigation_findings}

        ${domain.deliberate_recommendation.instruction}
      focus: "${domain.deliberate_recommendation.focus}"

  - name: verify_compliance
    primitive: verify
    temperature: 0.0
    params:
      rules: "${domain.verify_compliance.rules}"
      subject: |
        Recommendation: ${deliberate_recommendation.recommended_action}
        Risk tier: ${classify_risk.category}
        Applicant age: ${input.applicant_age}
        Loan amount: ${input.loan_amount}
        DTI: ${gather_application.data.get_financials.dti_ratio}
        Credit score: ${gather_application.data.get_credit.score}
    transitions:
      - default: govern_decision

  - name: govern_decision
    primitive: govern
    params:
      workflow_state: |
        risk_tier: ${classify_risk.category}
        recommendation: ${deliberate_recommendation.recommended_action}
        warrant: ${deliberate_recommendation.warrant}
        compliance_conforms: ${verify_compliance.conforms}
        compliance_violations: ${verify_compliance.violations}
        loan_amount: ${input.loan_amount}
      governance_context: "${domain.govern_decision.governance_context}"
