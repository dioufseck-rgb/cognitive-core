# ─────────────────────────────────────────────────────────────────────────────
# Edit this file to supply your domain knowledge.
# Domain Pack: Consumer Lending
# Pattern:     P02 — Eligibility Determination
# Overlays:    exception, governance
# Coordinator: simple (wait-for-result when specialist review needed)
#
# What this pack does:
#   Full-chain loan application review. Retrieves applicant data, classifies
#   risk tier, investigates edge cases for high-risk profiles, deliberates
#   on a warranted recommendation, verifies regulatory compliance (ECOA,
#   FCRA, DTI caps), and governs disposition.
#
# What you fill in:
#   - gather_application: what data sources to pull
#   - classify_risk: your risk tier definitions and criteria
#   - investigate_risk_factors: what to examine for high-risk profiles
#   - deliberate_recommendation: your outcome space and decision criteria
#   - verify_compliance: your regulatory and policy rules
#   - govern_decision: when each governance tier applies
#
# Regulatory context:
#   This pack implements the ECOA/FCRA adverse action requirement — every
#   decline must cite specific, traceable reasons from the credit file.
#   The verify_compliance step enforces this structurally.
#   Do not remove or weaken the compliance rules without legal review.
# ─────────────────────────────────────────────────────────────────────────────

domain_name: consumer_lending
base_pattern: P02-eligibility-determination
overlays:
  - exception
  - governance
coordinator_template: simple

# ─── Step: gather_application ────────────────────────────────────────────────
# Specify what data to retrieve. Each item becomes a tool call.
# The retrieved data is available in subsequent steps as
# ${gather_application.data.get_credit}, etc.

gather_application:
  specification: |
    Pull all required data for this application:
      - get_credit: Credit report — score, history, derogatory marks, utilisation
      - get_financials: Income verification, DTI ratio, existing obligations
      - get_employment: Employment status, tenure, employer verification
      - get_banking: Banking history, average balance, NSF events (last 12 months)
      - get_identity: Identity verification status, fraud flags

  # Context injected into the classify step input
  input_context: |
    Applicant: ${input.applicant_name}, age ${input.applicant_age}
    Requested amount: ${input.loan_amount}
    Purpose: ${input.loan_purpose}
    Credit score: ${gather_application.data.get_credit.score}
    DTI ratio: ${gather_application.data.get_financials.dti_ratio}
    Employment: ${gather_application.data.get_employment.status}

# ─── Step: classify_risk ─────────────────────────────────────────────────────
# Define your risk tiers. The workflow routes based on classification:
#   high_risk → investigate before deliberating
#   ineligible → skip deliberation, go to compliance check
#   all others → deliberate directly

classify_risk:
  input_context: |
    Applicant: ${input.applicant_name}, age ${input.applicant_age}
    Requested amount: ${input.loan_amount}
    Purpose: ${input.loan_purpose}
    Credit score: ${gather_application.data.get_credit.score}
    DTI ratio: ${gather_application.data.get_financials.dti_ratio}
    Employment: ${gather_application.data.get_employment.status}

  categories: |
    - prime: Strong credit profile. Score 720+, DTI under 36%, stable employment
      2+ years, no derogatory marks in 24 months. Standard approval path.
    - near_prime: Acceptable profile with minor concerns. Score 660-719, or
      DTI 36-43%, or employment gap under 6 months. Enhanced review required.
    - high_risk: Significant concerns. Score below 660, or DTI over 43%, or
      derogatory marks in 12 months, or unstable employment. Specialist review.
    - ineligible: Hard disqualifiers present — active bankruptcy, fraud flag,
      identity verification failed, or DTI above 50%. Cannot proceed.

  criteria: |
    Evaluate in this order:
    1. Check for any hard disqualifiers first → ineligible
    2. Score and DTI together are the primary drivers
    3. Employment stability modifies risk up or down
    4. Banking history is a signal, not a primary factor
    When near_prime and high_risk are both plausible, choose high_risk.
    Do not average — the worst qualifying factor sets the tier.

  # Transition conditions — adjust to match your category names above
  high_risk_condition: "output.category == 'high_risk'"
  ineligible_condition: "output.category == 'ineligible'"

# ─── Step: investigate_risk_factors ──────────────────────────────────────────
# Fires only for high_risk classifications.
# Define the scope of investigation — what questions must be answered.

investigate_risk_factors:
  question: |
    What are the specific risk factors and are there mitigating circumstances?

  input_context: |
    Credit profile: ${gather_application.data.get_credit}
    Financials: ${gather_application.data.get_financials}
    Employment: ${gather_application.data.get_employment}
    Banking history: ${gather_application.data.get_banking}
    Risk classification: ${classify_risk.category}

  scope: |
    1. What is driving the high-risk classification specifically?
       Be precise: which metric, how far outside acceptable range?
    2. Are there mitigating factors? (long tenure offsetting income gap,
       prior excellent history before recent event, etc.)
    3. What is the trajectory? Is the risk picture improving or worsening?
    4. Are there income sources not captured in standard verification?
    5. What is the probability of default given the full picture?
    6. Would a different loan structure (smaller amount, shorter term,
       secured) change the risk assessment?
    7. Are there any fraud or identity concerns that need flagging?

  effort_level: deep

# ─── Step: deliberate_recommendation ─────────────────────────────────────────
# Define your outcome space and the criteria for choosing between outcomes.
# recommended_action must be one of the listed options (exact string match).

deliberate_recommendation:
  context: |
    Risk classification: ${classify_risk.category}
    Investigation findings: ${investigate_risk_factors.finding}
    Loan amount: ${input.loan_amount}

  instruction: |
    Review the complete application picture and produce a warranted
    lending recommendation. Your options are:
      - approve: Approve at requested terms
      - approve_modified: Approve at different terms (specify in warrant)
      - approve_with_conditions: Approve pending additional documentation
      - decline: Decline with specific reason (regulatory requirement)
      - refer_specialist: Refer to specialist underwriter

    The recommended_action must be one of the above codes.
    The warrant must explain the logical connection between the
    applicant's financial picture and your recommendation.
    Every claim in the warrant must be traceable to the data.

  focus: |
    Evaluate against these criteria:
    - Ability to repay: income, DTI, stability
    - Willingness to repay: credit history, banking behaviour
    - Collateral (if secured): asset value vs loan amount
    - Risk-adjusted return: is this a good risk at the requested terms?

    Fair lending: would a similarly-situated applicant receive the same
    recommendation? Do not consider factors outside the credit file.

# ─── Step: verify_compliance ─────────────────────────────────────────────────
# These rules are regulatory requirements. Do not weaken without legal review.
# The compliance check fires for every case, including ineligible.

verify_compliance:
  rules: |
    The recommendation must satisfy ALL of the following:
    1. ECOA: Decision cannot be based on age, sex, race, national origin,
       religion, marital status, or receipt of public assistance.
    2. FCRA: If declining, adverse action reason must be specific and
       traceable to a reportable item in the credit file.
    3. DTI hard cap: Recommendation cannot be approve or approve_modified
       if DTI exceeds 50% — regulatory maximum.
    4. Ability-to-repay: Approval must be supportable by verified income,
       not stated income. If income unverified, conditions apply.
    5. Adverse action: decline recommendation must include the top 4
       reasons from the credit file in the warrant.
    6. Amount limits: loan amount must be within product parameters
       (min $1,000, max $50,000 for unsecured personal).

  # Context injected into the verification subject
  subject_context: |
    Risk tier: ${classify_risk.category}
    Applicant age: ${input.applicant_age}
    Loan amount: ${input.loan_amount}
    DTI: ${gather_application.data.get_financials.dti_ratio}
    Credit score: ${gather_application.data.get_credit.score}

# ─── Step: govern_decision ───────────────────────────────────────────────────

govern_decision:
  workflow_state: |
    risk_tier: ${classify_risk.category}
    recommendation: ${deliberate_recommendation.recommended_action}
    warrant: ${deliberate_recommendation.warrant}
    compliance_conforms: ${verify_compliance.conforms}
    compliance_violations: ${verify_compliance.violations}
    loan_amount: ${input.loan_amount}
    fraud_flag: ${gather_application.data.get_identity.fraud_flag}

  governance_context: |
    Determine governance tier based on the following:

    AUTO (proceed) — when:
    - Risk tier is prime, recommendation is approve, compliance conforms,
      loan amount is under $15,000, and confidence >= 0.85

    SPOT_CHECK (proceed, sample for review) — when:
    - Risk tier is prime or near_prime, recommendation is approve or
      approve_modified, compliance conforms, amount under $25,000

    GATE (suspend, underwriter review) — when:
    - Risk tier is high_risk with recommendation to approve or approve_modified
    - Loan amount is $25,000 or above
    - Compliance check found violations that need human resolution
    - Recommendation is refer_specialist
    - Confidence in recommendation is below 0.70

    HOLD (compliance hold) — when:
    - Compliance violations are critical (DTI cap, ECOA, FCRA)
    - Fraud flag is present in the identity or banking data
    - Adverse action documentation is incomplete

    Work order for underwriter must include:
    - The specific risk factors that triggered review
    - The deliberate step's warrant (the reasoning)
    - All compliance findings
    - Recommended decision for the underwriter to accept or override

  # Additional state to include in governance assessment
  additional_state: |
    loan_amount: ${input.loan_amount}
    fraud_flag: ${gather_application.data.get_identity.fraud_flag}
