name: triage_and_escalation
description: >
  Classify severity, investigate complex cases, generate a response or
  briefing artifact. Reusable across any triage domain — the domain
  scaffold supplies all domain-specific content.

steps:
  - name: classify_severity
    primitive: classify
    temperature: 0.0
    params:
      categories: "${domain.classify_severity.categories}"
      criteria: |
        ${domain.classify_severity.input_context}
        ${domain.classify_severity.criteria}
    transitions:
      - when: "${domain.classify_severity.escalate_condition}"
        goto: investigate_issue
      - default: generate_response

  - name: investigate_issue
    primitive: investigate
    params:
      question: "${domain.investigate_issue.question}"
      scope: "${domain.investigate_issue.scope}"
      available_evidence: "${domain.investigate_issue.input_context}"
      effort_level: "${domain.investigate_issue.effort_level}"
    transitions:
      - default: generate_response

  - name: generate_response
    primitive: generate
    params:
      requirements: |
        ${domain.generate_response.context}
        ${domain.generate_response.requirements}
      format: "${domain.generate_response.format}"
      constraints: "${domain.generate_response.constraints}"

