<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel FCU — Fraud Operations Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }

    :root {
      --navy: #1a2e4a;
      --navy-mid: #1e3a5f;
      --navy-light: #2c5282;
      --accent: #0ea5e9;
    }

    .bg-navy      { background-color: var(--navy); }
    .bg-navy-mid  { background-color: var(--navy-mid); }
    .text-navy    { color: var(--navy-mid); }
    .border-navy  { border-color: var(--navy-mid); }

    /* Animations */
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; display: inline-block;
      width: 14px; height: 14px; border: 2px solid currentColor;
      border-top-color: transparent; border-radius: 50%; }

    /* Kanban */
    .kanban-col {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
    }
    .kanban-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-radius: 8px 8px 0 0;
      font-size: 11px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase;
    }
    .kanban-cards {
      flex: 1; overflow-y: auto; padding: 8px 6px;
      display: flex; flex-direction: column; gap: 6px;
      background: #f1f5f9; border-radius: 0 0 8px 8px;
      min-height: 120px;
    }

    /* Case card */
    .case-card {
      background: white; border-radius: 8px; padding: 12px 14px;
      border: 1px solid #e2e8f0; cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
    }
    .case-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); border-color: #cbd5e1; }
    .case-card.selected { border-color: var(--navy-mid); box-shadow: 0 0 0 2px rgba(30,58,95,.15); }
    .case-card.gate-pending { border-color: #f59e0b; border-left: 3px solid #f59e0b; }

    /* Right panel tabs */
    .tab-btn {
      padding: 8px 16px; font-size: 13px; font-weight: 500;
      border-bottom: 2px solid transparent; cursor: pointer;
      color: #64748b; transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--navy-mid); border-bottom-color: var(--navy-mid); }
    .tab-btn:hover:not(.active) { color: #475569; }

    /* Step cards */
    .step-card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
    .step-header {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; cursor: pointer; background: #f8fafc; user-select: none;
    }
    .step-header:hover { background: #f1f5f9; }

    /* Confidence bar */
    .conf-bar-fill { transition: width 0.4s ease; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    .modal-overlay.hidden { display: none; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: 8px;
      background: #1e293b; color: white; font-size: 14px;
      font-weight: 500; opacity: 0; pointer-events: none;
      transition: opacity 0.3s; z-index: 100;
    }
    #toast.show { opacity: 1; pointer-events: auto; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* Data table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { text-align: left; padding: 6px 10px; background: #f8fafc;
      font-weight: 600; color: #475569; font-size: 11px; text-transform: uppercase;
      letter-spacing: .04em; border-bottom: 1px solid #e2e8f0; }
    .data-table td { padding: 7px 10px; border-bottom: 1px solid #f1f5f9; color: #334155; vertical-align: top; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #f8fafc; }

    /* Gate banner */
    @keyframes gate-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,.4); }
      50% { box-shadow: 0 0 0 6px rgba(245,158,11,0); }
    }
    .gate-banner { animation: gate-pulse 2s ease infinite; }

    /* Scrollable section */
    .scroll-section { overflow-y: auto; }

    /* Narrative block */
    .narrative {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
      padding: 14px 16px; font-size: 13px; line-height: 1.7;
      color: #334155; white-space: pre-wrap; font-family: inherit;
    }
  </style>
</head>
<body class="h-full bg-slate-100" style="overflow:hidden">

<!-- ═══ HEADER ═══════════════════════════════════════════════════════ -->
<div class="bg-navy text-white px-5 flex items-center justify-between shadow-lg" style="height:52px">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-white/20 flex items-center justify-center font-bold text-sm">S</div>
    <div>
      <div class="font-semibold text-sm tracking-wide">Sentinel Federal Credit Union</div>
      <div class="text-xs text-slate-400">Fraud Operations Center</div>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <div id="gate-badge" class="hidden items-center gap-2 bg-amber-500/20 text-amber-200 px-3 py-1 rounded-full text-xs font-medium border border-amber-400/30">
      <span class="w-1.5 h-1.5 rounded-full bg-amber-400 pulse-dot"></span>
      <span id="gate-badge-text">0 pending</span>
    </div>
    <div id="running-badge" class="hidden items-center gap-2 bg-sky-500/20 text-sky-200 px-3 py-1 rounded-full text-xs font-medium">
      <span class="w-1.5 h-1.5 rounded-full bg-sky-400 pulse-dot"></span>
      <span id="running-badge-text">0 running</span>
    </div>
    <button onclick="openSubmitModal()"
      class="bg-white/10 hover:bg-white/20 text-white text-xs font-medium px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1.5">
      <span class="text-base leading-none">+</span> New Case
    </button>
    <button onclick="confirmReset()"
      class="bg-white/10 hover:bg-red-500/30 text-white/60 hover:text-white text-xs font-medium px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1.5">
      ↺ Reset
    </button>
    <span class="text-slate-500 text-xs" id="last-refresh">–</span>
  </div>
</div>

<!-- ═══ MAIN LAYOUT ══════════════════════════════════════════════════ -->
<div class="flex" style="height:calc(100vh - 52px)">

  <!-- ── LEFT: Kanban ────────────────────────────────────────────── -->
  <div class="flex flex-col" style="width:62%;min-width:0;border-right:1px solid #e2e8f0">

    <!-- Kanban board -->
    <div class="flex gap-3 p-4" style="flex:1;min-height:0;overflow:hidden">

      <!-- Triage column -->
      <div class="kanban-col">
        <div class="kanban-col-header bg-sky-100 text-sky-800">
          <span>Triage</span>
          <span id="count-triage" class="bg-sky-200 text-sky-700 rounded-full px-2 py-0.5 text-xs">0</span>
        </div>
        <div class="kanban-cards" id="col-triage">
          <div class="text-center text-slate-400 text-xs py-4">No cases</div>
        </div>
      </div>

      <!-- Investigation column -->
      <div class="kanban-col">
        <div class="kanban-col-header bg-violet-100 text-violet-800">
          <span>Investigation</span>
          <span id="count-investigation" class="bg-violet-200 text-violet-700 rounded-full px-2 py-0.5 text-xs">0</span>
        </div>
        <div class="kanban-cards" id="col-investigation">
          <div class="text-center text-slate-400 text-xs py-4">No cases</div>
        </div>
      </div>

      <!-- Needs Review column -->
      <div class="kanban-col">
        <div class="kanban-col-header bg-amber-100 text-amber-800">
          <span>Needs Review</span>
          <span id="count-needs_review" class="bg-amber-200 text-amber-700 rounded-full px-2 py-0.5 text-xs">0</span>
        </div>
        <div class="kanban-cards" id="col-needs_review">
          <div class="text-center text-slate-400 text-xs py-4">No cases</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── RIGHT: Detail + Completed ──────────────────────────────── -->
  <div class="flex flex-col bg-white" style="width:38%;min-width:0">

    <!-- Tab bar -->
    <div class="flex border-b border-slate-200 px-4 bg-white shrink-0">
      <button class="tab-btn active" id="tab-detail-btn" onclick="switchTab('detail')">Case Detail</button>
      <button class="tab-btn" id="tab-completed-btn" onclick="switchTab('completed')">
        Completed
        <span id="completed-count-badge" class="ml-1.5 bg-slate-100 text-slate-500 text-xs px-1.5 py-0.5 rounded-full">0</span>
      </button>
    </div>

    <!-- Detail tab -->
    <div id="tab-detail" class="flex-1 overflow-y-auto scroll-section">
      <div class="flex flex-col items-center justify-center h-full text-slate-400 p-8">
        <div class="text-3xl mb-3">👆</div>
        <div class="font-medium text-center">Select a case from the board</div>
        <div class="text-sm mt-1 text-center">Click any card to view details and take action</div>
      </div>
    </div>

    <!-- Completed tab -->
    <div id="tab-completed" class="flex-1 overflow-y-auto scroll-section hidden">
      <div id="completed-list" class="divide-y divide-slate-100">
        <div class="p-6 text-center text-slate-400 text-sm">Loading...</div>
      </div>
    </div>

  </div>
</div>

<!-- ═══ SUBMIT MODAL ══════════════════════════════════════════════════ -->
<div id="submit-modal" class="modal-overlay hidden">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4">
    <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
      <h2 class="font-semibold text-navy">Submit New Case</h2>
      <button onclick="closeSubmitModal()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Case File</label>
        <select id="submit-case-file" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
          <option value="">Loading...</option>
        </select>
        <p id="submit-case-desc" class="mt-1 text-xs text-slate-500"></p>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Workflow</label>
          <input id="submit-workflow" value="fraud_triage" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Domain</label>
          <input id="submit-domain" value="fraud_triage" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200" />
        </div>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
      <button onclick="closeSubmitModal()" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancel</button>
      <button onclick="submitCase()" id="submit-btn"
        class="px-5 py-2 bg-navy-mid text-white text-sm font-medium rounded-lg hover:bg-navy-light transition-colors"
        style="background:var(--navy-mid)">
        Run Workflow
      </button>
    </div>
  </div>
</div>

<!-- ═══ ACTION CONFIRM MODAL ══════════════════════════════════════════ -->
<div id="confirm-modal" class="modal-overlay hidden">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm mx-4">
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="font-semibold text-navy" id="confirm-title">Confirm</h2>
    </div>
    <div class="px-6 py-4 space-y-3">
      <p class="text-sm text-slate-600" id="confirm-message"></p>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Analyst</label>
        <input id="confirm-analyst" value="analyst"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" id="confirm-notes-label">Notes</label>
        <textarea id="confirm-notes" rows="2" placeholder="Optional notes..."
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 resize-none"></textarea>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
      <button onclick="closeConfirmModal()" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancel</button>
      <button onclick="executeConfirm()" id="confirm-action-btn"
        class="px-5 py-2 text-white text-sm font-medium rounded-lg transition-colors">Confirm</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/app.js"></script>
</body>
</html>
