# ─────────────────────────────────────────────────────────────────────────────
# Cognitive Core — LLM Configuration
#
# This file is the single source of truth for model names and provider settings.
# Edit this file when models are deprecated or you want to use different models.
# Never hardcode model names in application code.
#
# Override any value without editing this file:
#   LLM_DEFAULT_MODEL=<model>     override the default model
#   LLM_PROVIDER=<provider>       override the provider
#   LLM_CONFIG_PATH=<path>        load a different config file entirely
# ─────────────────────────────────────────────────────────────────────────────

# ── Provider ──────────────────────────────────────────────────────────────────
# Leave null to auto-detect from API key environment variables.
# Set explicitly to force a specific provider.
#
#   null        → auto-detect (recommended)
#   google      → requires GOOGLE_API_KEY
#   openai      → requires OPENAI_API_KEY
#   azure       → requires AZURE_OPENAI_ENDPOINT + AZURE_OPENAI_API_KEY
#   bedrock     → requires AWS credentials
#
default_provider: null


# ── Model aliases ─────────────────────────────────────────────────────────────
# Maps logical alias → provider → model name.
# Workflows reference aliases ("default", "fast", "standard", "strong").
# Changing a model here updates all workflows that use that alias.
#
# IMPORTANT: Model availability varies by API key tier and region.
# If you get a 404 error, replace the model name here with one from:
#   python -m cognitive_core.engine.llm --list-models
#
aliases:
  # Default: used when no model is specified. Should be fast and cheap.
  default:
    anthropic:    claude-haiku-4-5-20251001
    google:       gemini-3-flash-preview
    openai:       gpt-4o-mini
    azure:        gpt-4o-mini
    azure_foundry: gpt-4o-mini
    bedrock:      anthropic.claude-3-5-haiku-20241022-v1:0

  # Fast: used for low-latency steps (classify, verify).
  # Uses the lite model for speed — these steps are deterministic and don't need full capacity.
  fast:
    anthropic:    claude-haiku-4-5-20251001
    google:       gemini-3.1-flash-lite-preview
    openai:       gpt-4o-mini
    azure:        gpt-4o-mini
    azure_foundry: gpt-4o-mini
    bedrock:      anthropic.claude-3-5-haiku-20241022-v1:0

  # Standard: used for steps requiring more reasoning depth.
  standard:
    anthropic:    claude-sonnet-4-6
    google:       gemini-3-flash-preview
    openai:       gpt-4o
    azure:        gpt-4o
    azure_foundry: gpt-4o
    bedrock:      anthropic.claude-3-5-sonnet-20241022-v2:0

  # Strong: used for the most complex reasoning steps.
  strong:
    anthropic:    claude-sonnet-4-6
    google:       gemini-3-flash-preview
    openai:       gpt-4o
    azure:        gpt-4o
    azure_foundry: gpt-4o
    bedrock:      anthropic.claude-3-5-sonnet-20241022-v2:0


# ── Model → provider lookup ───────────────────────────────────────────────────
# Used to infer the provider when a workflow specifies a model name directly.
# Add entries here when using models not listed above.
#
model_to_provider:
  # Google
  gemini-3-flash-preview:        google
  gemini-3.1-flash-lite-preview:  google
  gemini-2.0-flash:             google
  gemini-2.0-flash-lite:        google
  gemini-2.5-flash-preview-04-17: google
  gemini-2.5-pro:               google
  gemini-3.1-flash-lite-preview: google
  gemini-3.1-pro-preview-customtools: google
  # Anthropic
  claude-haiku-4-5-20251001:    anthropic
  claude-sonnet-4-6:            anthropic
  claude-opus-4-6:              anthropic
  # OpenAI
  gpt-4o:                       openai
  gpt-4o-mini:                  openai
  gpt-4.1:                      openai
  gpt-4.1-mini:                 openai
  o3:                           openai
  o4-mini:                      openai
  # Anthropic via Bedrock
  anthropic.claude-3-5-haiku-20241022-v1:0:   bedrock
  anthropic.claude-3-5-sonnet-20241022-v2:0:  bedrock
  anthropic.claude-3-7-sonnet-20250219-v1:0:  bedrock


# ── Provider-level defaults ───────────────────────────────────────────────────
# Fallback model per provider when no alias matches.
#
provider_defaults:
  anthropic:    claude-haiku-4-5-20251001
  google:       gemini-3-flash-preview
  openai:       gpt-4o-mini
  azure:        gpt-4o
  azure_foundry: gpt-4o
  bedrock:      anthropic.claude-3-5-haiku-20241022-v1:0


# ── Pricing (cost tracking) ───────────────────────────────────────────────────
# USD per million tokens. Used for cost tracking — not required for operation.
# Set to null to disable cost tracking for a model.
#
pricing:
