    input_per_million:  0.80
    output_per_million: 4.00
  claude-sonnet-4-6:
    input_per_million:  3.00
    output_per_million: 15.00
  gemini-2.0-flash:
    input_per_million:  0.10
    output_per_million: 0.40
  gemini-2.5-pro:
    input_per_million:  1.25
    output_per_million: 10.00
  gpt-4o-mini:
    input_per_million:  0.15
    output_per_million: 0.60
  gpt-4o:
    input_per_million:  2.50
    output_per_million: 10.00


# ── Provider settings ─────────────────────────────────────────────────────────
# Provider-specific configuration. Uncomment and edit as needed.
#
provider_settings:
  google:
    # temperature: 0.7
    # top_p: 0.95
    # max_output_tokens: 8192
  openai:
    # timeout: 60
  azure:
    # api_version: "2024-08-01-preview"


# ── Per-primitive output token budgets ────────────────────────────────────────
# Controls max_tokens (Anthropic/OpenAI) / max_output_tokens (Google) per call.
# Heavy primitives (deliberate, reflect, govern, generate, challenge) produce
# large JSON schemas with multiple list fields — they need real headroom.
# Light primitives (retrieve, classify, verify) are structurally bounded.
#
# These values are passed at invocation time via create_llm(**kwargs).
# Override per-step in domain configs via: params.max_tokens: <n>
# To disable the budget for a primitive (use provider default): set to null.
primitive_max_tokens:
  retrieve:    4096
  classify:    4096
  investigate: 8192
  verify:      6144
  deliberate:  8192
  reflect:     8192
  generate:    8192
  challenge:   8192
  govern:      6144

# Per-primitive model alias overrides.
# classify uses 'fast' by default but the fast lite model truncates on
# multi-category schemas with compound criteria. Override to 'standard'
# so classification is reliable across all domains without per-domain tuning.
# verify also benefits from standard — the two-stage constraint checker
# produces dense JSON that lite models truncate.
primitive_model_alias:
  classify: standard
  verify:   standard